version: "{build}"
image:
  - Visual Studio 2022
  - Ubuntu2204
clone_depth: 1

skip_non_tags: true
skip_branch_with_pr: true

environment:
  DOTNET_INSTALL_VERSION: 10.0.103
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  NUGET_XMLDOC_MODE: skip

build_script:
  - ps: |
      $ErrorActionPreference = if ($IsWindows) { "Continue" } else { "Stop" }
      $dotnet = "dotnet"

      if ($IsWindows) {
          $dotnetInstallDir = "C:\dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1 -UseBasicParsing
          .\dotnet-install.ps1 -Version $env:DOTNET_INSTALL_VERSION -InstallDir $dotnetInstallDir -NoPath
          $dotnet = "$dotnetInstallDir\dotnet.exe"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "$dotnetInstallDir;$env:PATH"
      }
      else {
          $dotnetInstallDir = Join-Path $HOME ".dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.sh -OutFile dotnet-install.sh -UseBasicParsing
          bash ./dotnet-install.sh --version $env:DOTNET_INSTALL_VERSION --install-dir $dotnetInstallDir --no-path
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet-install.sh failed with exit code $LASTEXITCODE."
          }

          $dotnet = "$dotnetInstallDir/dotnet"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "${dotnetInstallDir}:$env:PATH"
      }

      & $dotnet --version 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet --version failed with exit code $LASTEXITCODE."
      }

      & $dotnet restore AureTTY.slnx 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet restore AureTTY.slnx failed with exit code $LASTEXITCODE."
      }

      if ($IsWindows) {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }
      else {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }

      if (Test-Path "artifacts") {
          Remove-Item -Recurse -Force "artifacts"
      }

      New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null

      $tag = if ($env:APPVEYOR_REPO_TAG_NAME) { $env:APPVEYOR_REPO_TAG_NAME } else { "dev" }
      $winArchive = "artifacts/AureTTY-$tag-win-x64.zip"
      $linuxArchive = "artifacts/AureTTY-$tag-linux-x64.zip"
      $winAotArchive = "artifacts/AureTTY-$tag-win-x64-aot.zip"
      $linuxAotArchive = "artifacts/AureTTY-$tag-linux-x64-aot.zip"
      $linuxArm64AotArchive = "artifacts/AureTTY-$tag-linux-arm64-aot.zip"
      $linuxArmAotArchive = "artifacts/AureTTY-$tag-linux-arm-aot.zip"
      $linuxDebAmd64 = "artifacts/AureTTY-$tag-linux-amd64.deb"
      $linuxDebArm64 = "artifacts/AureTTY-$tag-linux-arm64.deb"
      $linuxDebArmhf = "artifacts/AureTTY-$tag-linux-armhf.deb"
      $linuxX64Manifest = "artifacts/AureTTY-$tag-linux-x64-manifest.txt"
      $linuxArmManifest = "artifacts/AureTTY-$tag-linux-arm-manifest.txt"
      $linuxDebManifest = "artifacts/AureTTY-$tag-linux-deb-manifest.txt"
      $openwrtX64Archive = "artifacts/AureTTY-$tag-openwrt-x86_64.zip"
      $openwrtAarch64Archive = "artifacts/AureTTY-$tag-openwrt-aarch64.zip"
      $openwrtArmv7Archive = "artifacts/AureTTY-$tag-openwrt-armv7.zip"
      $openwrtX64IpkArchive = "artifacts/AureTTY-$tag-openwrt-x86_64-ipk.zip"
      $openwrtAarch64IpkArchive = "artifacts/AureTTY-$tag-openwrt-aarch64-ipk.zip"
      $openwrtArmv7IpkArchive = "artifacts/AureTTY-$tag-openwrt-armv7-ipk.zip"
      $openwrtManifest = "artifacts/AureTTY-$tag-openwrt-manifest.txt"

      function Write-ArtifactSha256 {
          param(
              [Parameter(Mandatory = $true)]
              [string]$ArtifactPath,
              [Parameter(Mandatory = $true)]
              [string]$ChecksumPath
          )

          Get-FileHash $ArtifactPath -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $ArtifactPath)"
          } | Out-File -Encoding ascii $ChecksumPath
      }

      function Compress-ArtifactAndWriteSha256 {
          param(
              [Parameter(Mandatory = $true)]
              [string]$SourcePath,
              [Parameter(Mandatory = $true)]
              [string]$ArchivePath,
              [Parameter(Mandatory = $true)]
              [string]$ChecksumPath
          )

          Compress-Archive -Path $SourcePath -DestinationPath $ArchivePath -Force
          Write-ArtifactSha256 -ArtifactPath $ArchivePath -ChecksumPath $ChecksumPath
      }

      if ($IsWindows) {
          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64 failed with exit code $LASTEXITCODE."
          }

          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishAot=true -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64-aot 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64-aot failed with exit code $LASTEXITCODE."
          }

          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/win-x64/*" -ArchivePath $winArchive -ChecksumPath "artifacts/AureTTY-$tag-win-x64.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/win-x64-aot/*" -ArchivePath $winAotArchive -ChecksumPath "artifacts/AureTTY-$tag-win-x64-aot.sha256"
      }
      else {
          bash ./scripts/ci/build-linux-x64-scd.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux x64 single-file build+smoke failed with exit code $LASTEXITCODE."
          }

          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/linux-x64/*" -ArchivePath $linuxArchive -ChecksumPath "artifacts/AureTTY-$tag-linux-x64.sha256"

          bash ./scripts/ci/build-linux-x64-aot.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux x64 AOT build+smoke failed with exit code $LASTEXITCODE."
          }

          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/linux-x64-aot/*" -ArchivePath $linuxAotArchive -ChecksumPath "artifacts/AureTTY-$tag-linux-x64-aot.sha256"

          bash ./scripts/ci/build-linux-arm-emulated.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux ARM emulated builds failed with exit code $LASTEXITCODE."
          }

          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/linux-arm64-aot/*" -ArchivePath $linuxArm64AotArchive -ChecksumPath "artifacts/AureTTY-$tag-linux-arm64-aot.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/publish/linux-arm-aot/*" -ArchivePath $linuxArmAotArchive -ChecksumPath "artifacts/AureTTY-$tag-linux-arm-aot.sha256"

          bash ./scripts/ci/build-linux-deb.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux Debian package build failed with exit code $LASTEXITCODE."
          }

          $debAmd64Source = Get-ChildItem -Path "artifacts/deb" -Filter "auretty_*_amd64.deb" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $debArm64Source = Get-ChildItem -Path "artifacts/deb" -Filter "auretty_*_arm64.deb" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $debArmhfSource = Get-ChildItem -Path "artifacts/deb" -Filter "auretty_*_armhf.deb" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $debAmd64Source -or $null -eq $debArm64Source -or $null -eq $debArmhfSource) {
              throw "One or more Debian package artifacts are missing in artifacts/deb."
          }

          Copy-Item -Path $debAmd64Source.FullName -Destination $linuxDebAmd64 -Force
          Copy-Item -Path $debArm64Source.FullName -Destination $linuxDebArm64 -Force
          Copy-Item -Path $debArmhfSource.FullName -Destination $linuxDebArmhf -Force
          Write-ArtifactSha256 -ArtifactPath $linuxDebAmd64 -ChecksumPath "artifacts/AureTTY-$tag-linux-amd64.sha256"
          Write-ArtifactSha256 -ArtifactPath $linuxDebArm64 -ChecksumPath "artifacts/AureTTY-$tag-linux-arm64.sha256"
          Write-ArtifactSha256 -ArtifactPath $linuxDebArmhf -ChecksumPath "artifacts/AureTTY-$tag-linux-armhf.sha256"

          $linuxDebManifestSource = "artifacts/deb/manifest.txt"
          if (-not (Test-Path $linuxDebManifestSource)) {
              throw "Missing Linux Debian manifest: $linuxDebManifestSource"
          }
          Copy-Item -Path $linuxDebManifestSource -Destination $linuxDebManifest -Force
          Write-ArtifactSha256 -ArtifactPath $linuxDebManifest -ChecksumPath "artifacts/AureTTY-$tag-linux-deb-manifest.sha256"

          bash ./scripts/ci/validate-deb-packages.sh `
            "$linuxDebAmd64" `
            "$linuxDebArm64" `
            "$linuxDebArmhf"
          if ($LASTEXITCODE -ne 0) {
              throw "Debian package validation failed with exit code $LASTEXITCODE."
          }

          $linuxX64ManifestSource = "artifacts/publish/linux-x64-manifest.txt"
          if (-not (Test-Path $linuxX64ManifestSource)) {
              throw "Missing Linux x64 manifest: $linuxX64ManifestSource"
          }
          Copy-Item -Path $linuxX64ManifestSource -Destination $linuxX64Manifest -Force
          Write-ArtifactSha256 -ArtifactPath $linuxX64Manifest -ChecksumPath "artifacts/AureTTY-$tag-linux-x64-manifest.sha256"

          bash ./scripts/ci/build-openwrt-artifacts.sh
          if ($LASTEXITCODE -ne 0) {
              throw "OpenWRT builds failed with exit code $LASTEXITCODE."
          }

          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/x86_64/*" -ArchivePath $openwrtX64Archive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-x86_64.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/aarch64/*" -ArchivePath $openwrtAarch64Archive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-aarch64.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/armv7/*" -ArchivePath $openwrtArmv7Archive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-armv7.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/ipk/x86_64/*" -ArchivePath $openwrtX64IpkArchive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-x86_64-ipk.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/ipk/aarch64/*" -ArchivePath $openwrtAarch64IpkArchive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-aarch64-ipk.sha256"
          Compress-ArtifactAndWriteSha256 -SourcePath "artifacts/openwrt/ipk/armv7/*" -ArchivePath $openwrtArmv7IpkArchive -ChecksumPath "artifacts/AureTTY-$tag-openwrt-armv7-ipk.sha256"

          $linuxArmManifestSource = "artifacts/publish/linux-arm-manifest.txt"
          if (-not (Test-Path $linuxArmManifestSource)) {
              throw "Missing Linux ARM manifest: $linuxArmManifestSource"
          }
          Copy-Item -Path $linuxArmManifestSource -Destination $linuxArmManifest -Force
          Write-ArtifactSha256 -ArtifactPath $linuxArmManifest -ChecksumPath "artifacts/AureTTY-$tag-linux-arm-manifest.sha256"

          bash ./scripts/ci/pack-nuget.sh artifacts/nuget
          if ($LASTEXITCODE -ne 0) {
              throw "NuGet packaging failed with exit code $LASTEXITCODE."
          }

          $openwrtManifestSource = "artifacts/openwrt/manifest.txt"
          if (-not (Test-Path $openwrtManifestSource)) {
              throw "Missing OpenWRT manifest: $openwrtManifestSource"
          }
          Copy-Item -Path $openwrtManifestSource -Destination $openwrtManifest -Force
          Write-ArtifactSha256 -ArtifactPath $openwrtManifest -ChecksumPath "artifacts/AureTTY-$tag-openwrt-manifest.sha256"

          bash ./scripts/ci/validate-sha256-files.sh `
            "artifacts/AureTTY-$tag-linux-x64.sha256" `
            "artifacts/AureTTY-$tag-linux-x64-aot.sha256" `
            "artifacts/AureTTY-$tag-linux-arm64-aot.sha256" `
            "artifacts/AureTTY-$tag-linux-arm-aot.sha256" `
            "artifacts/AureTTY-$tag-linux-amd64.sha256" `
            "artifacts/AureTTY-$tag-linux-arm64.sha256" `
            "artifacts/AureTTY-$tag-linux-armhf.sha256" `
            "artifacts/AureTTY-$tag-linux-x64-manifest.sha256" `
            "artifacts/AureTTY-$tag-linux-arm-manifest.sha256" `
            "artifacts/AureTTY-$tag-linux-deb-manifest.sha256" `
            "artifacts/AureTTY-$tag-openwrt-x86_64.sha256" `
            "artifacts/AureTTY-$tag-openwrt-aarch64.sha256" `
            "artifacts/AureTTY-$tag-openwrt-armv7.sha256" `
            "artifacts/AureTTY-$tag-openwrt-x86_64-ipk.sha256" `
            "artifacts/AureTTY-$tag-openwrt-aarch64-ipk.sha256" `
            "artifacts/AureTTY-$tag-openwrt-armv7-ipk.sha256" `
            "artifacts/AureTTY-$tag-openwrt-manifest.sha256"
          if ($LASTEXITCODE -ne 0) {
              throw "Release checksum validation failed with exit code $LASTEXITCODE."
          }

          bash ./scripts/ci/validate-release-archives.sh `
            "$linuxArchive" `
            "$linuxAotArchive" `
            "$linuxArm64AotArchive" `
            "$linuxArmAotArchive" `
            "$openwrtX64Archive" `
            "$openwrtAarch64Archive" `
            "$openwrtArmv7Archive" `
            "$openwrtX64IpkArchive" `
            "$openwrtAarch64IpkArchive" `
            "$openwrtArmv7IpkArchive"
          if ($LASTEXITCODE -ne 0) {
              throw "Release archive validation failed with exit code $LASTEXITCODE."
          }
      }

