version: "{build}"
image:
  - Visual Studio 2022
  - Ubuntu2204
clone_depth: 1

skip_non_tags: true
skip_branch_with_pr: true

environment:
  DOTNET_INSTALL_VERSION: 10.0.103
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  NUGET_XMLDOC_MODE: skip

build_script:
  - ps: |
      $ErrorActionPreference = if ($IsWindows) { "Continue" } else { "Stop" }
      $dotnet = "dotnet"

      if ($IsWindows) {
          $dotnetInstallDir = "C:\dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1 -UseBasicParsing
          .\dotnet-install.ps1 -Version $env:DOTNET_INSTALL_VERSION -InstallDir $dotnetInstallDir -NoPath
          $dotnet = "$dotnetInstallDir\dotnet.exe"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "$dotnetInstallDir;$env:PATH"
      }
      else {
          $dotnetInstallDir = Join-Path $HOME ".dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.sh -OutFile dotnet-install.sh -UseBasicParsing
          bash ./dotnet-install.sh --version $env:DOTNET_INSTALL_VERSION --install-dir $dotnetInstallDir --no-path
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet-install.sh failed with exit code $LASTEXITCODE."
          }

          $dotnet = "$dotnetInstallDir/dotnet"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "$dotnetInstallDir:$env:PATH"
      }

      & $dotnet --version 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet --version failed with exit code $LASTEXITCODE."
      }

      & $dotnet restore AureTTY.slnx 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet restore AureTTY.slnx failed with exit code $LASTEXITCODE."
      }

      if ($IsWindows) {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }
      else {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }

      if (Test-Path "artifacts/publish") {
          Remove-Item -Recurse -Force "artifacts/publish"
      }

      New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null

      $tag = if ($env:APPVEYOR_REPO_TAG_NAME) { $env:APPVEYOR_REPO_TAG_NAME } else { "dev" }
      $winArchive = "artifacts/AureTTY-$tag-win-x64.zip"
      $linuxArchive = "artifacts/AureTTY-$tag-linux-x64.zip"
      $winAotArchive = "artifacts/AureTTY-$tag-win-x64-aot.zip"
      $linuxAotArchive = "artifacts/AureTTY-$tag-linux-x64-aot.zip"
      $openwrtX64Archive = "artifacts/AureTTY-$tag-openwrt-x86_64.zip"
      $openwrtAarch64Archive = "artifacts/AureTTY-$tag-openwrt-aarch64.zip"
      $openwrtArmv7Archive = "artifacts/AureTTY-$tag-openwrt-armv7.zip"

      if ($IsWindows) {
          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64 failed with exit code $LASTEXITCODE."
          }

          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0 -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/linux-x64 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish linux-x64 failed with exit code $LASTEXITCODE."
          }

          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishAot=true -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64-aot 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64-aot failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/publish/win-x64/*" -DestinationPath $winArchive -Force
          Compress-Archive -Path "artifacts/publish/linux-x64/*" -DestinationPath $linuxArchive -Force
          Compress-Archive -Path "artifacts/publish/win-x64-aot/*" -DestinationPath $winAotArchive -Force

          Get-FileHash $winArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $winArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-win-x64.sha256"

          Get-FileHash $linuxArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-x64.sha256"

          Get-FileHash $winAotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $winAotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-win-x64-aot.sha256"
      }
      else {
          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0 -c Release -r linux-x64 --self-contained true -p:PublishAot=true -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/linux-x64-aot 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish linux-x64-aot failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/publish/linux-x64-aot/*" -DestinationPath $linuxAotArchive -Force
          Get-FileHash $linuxAotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxAotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-x64-aot.sha256"

          bash -lc "set -euo pipefail; \
            sudo apt-get update; \
            sudo apt-get install -y musl-tools musl-dev zstd xz-utils curl binutils file ruby-full; \
            mkdir -p .tools/openwrt-toolchains; \
            AARCH64_TARBALL='.tools/openwrt-toolchains/openwrt-toolchain-24.10.6-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst'; \
            if [ ! -d '.tools/openwrt-toolchains/openwrt-toolchain-24.10.6-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64' ]; then \
              if [ ! -f \"$AARCH64_TARBALL\" ]; then \
                curl -fL --retry 3 --retry-all-errors -o \"$AARCH64_TARBALL\" 'https://downloads.openwrt.org/releases/24.10.6/targets/armsr/armv8/openwrt-toolchain-24.10.6-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst'; \
              fi; \
              tar --zstd -xf \"$AARCH64_TARBALL\" -C .tools/openwrt-toolchains; \
            fi; \
            ARMV7_TARBALL='.tools/openwrt-toolchains/openwrt-toolchain-24.10.6-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst'; \
            if [ ! -d '.tools/openwrt-toolchains/openwrt-toolchain-24.10.6-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64' ]; then \
              if [ ! -f \"$ARMV7_TARBALL\" ]; then \
                curl -fL --retry 3 --retry-all-errors -o \"$ARMV7_TARBALL\" 'https://downloads.openwrt.org/releases/24.10.6/targets/ipq40xx/generic/openwrt-toolchain-24.10.6-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst'; \
              fi; \
              tar --zstd -xf \"$ARMV7_TARBALL\" -C .tools/openwrt-toolchains; \
            fi; \
            ARCH=x86_64 ./build-openwrt.sh; \
            ARCH=aarch64 ./build-openwrt.sh; \
            ARCH=armv7 ./build-openwrt.sh"
          if ($LASTEXITCODE -ne 0) {
              throw "OpenWRT builds failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/openwrt/x86_64/*" -DestinationPath $openwrtX64Archive -Force
          Compress-Archive -Path "artifacts/openwrt/aarch64/*" -DestinationPath $openwrtAarch64Archive -Force
          Compress-Archive -Path "artifacts/openwrt/armv7/*" -DestinationPath $openwrtArmv7Archive -Force

          Get-FileHash $openwrtX64Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtX64Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-x86_64.sha256"

          Get-FileHash $openwrtAarch64Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtAarch64Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-aarch64.sha256"

          Get-FileHash $openwrtArmv7Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtArmv7Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-armv7.sha256"
      }

artifacts:
  - path: artifacts/AureTTY-*-win-x64.zip
    name: auretty-win-x64
  - path: artifacts/AureTTY-*-linux-x64.zip
    name: auretty-linux-x64
  - path: artifacts/AureTTY-*-win-x64-aot.zip
    name: auretty-win-x64-aot
  - path: artifacts/AureTTY-*-linux-x64-aot.zip
    name: auretty-linux-x64-aot
  - path: artifacts/AureTTY-*-win-x64.sha256
    name: auretty-win-x64-sha256
  - path: artifacts/AureTTY-*-linux-x64.sha256
    name: auretty-linux-x64-sha256
  - path: artifacts/AureTTY-*-win-x64-aot.sha256
    name: auretty-win-x64-aot-sha256
  - path: artifacts/AureTTY-*-linux-x64-aot.sha256
    name: auretty-linux-x64-aot-sha256
  - path: artifacts/AureTTY-*-openwrt-x86_64.zip
    name: auretty-openwrt-x86_64
  - path: artifacts/AureTTY-*-openwrt-aarch64.zip
    name: auretty-openwrt-aarch64
  - path: artifacts/AureTTY-*-openwrt-armv7.zip
    name: auretty-openwrt-armv7
  - path: artifacts/AureTTY-*-openwrt-x86_64.sha256
    name: auretty-openwrt-x86_64-sha256
  - path: artifacts/AureTTY-*-openwrt-aarch64.sha256
    name: auretty-openwrt-aarch64-sha256
  - path: artifacts/AureTTY-*-openwrt-armv7.sha256
    name: auretty-openwrt-armv7-sha256

deploy_script:
  - ps: |
      $ErrorActionPreference = "Stop"

      if ($env:APPVEYOR_REPO_TAG -ne "true") {
          Write-Host "Skipping GitHub release upload for non-tag build."
          return
      }

      if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
          throw "GITHUB_TOKEN is not configured in AppVeyor project settings."
      }

      $repo = if ($env:APPVEYOR_REPO_NAME) { $env:APPVEYOR_REPO_NAME.Trim() } else { "" }
      $tag = if ($env:APPVEYOR_REPO_TAG_NAME) { $env:APPVEYOR_REPO_TAG_NAME.Trim() } else { "" }
      if ([string]::IsNullOrWhiteSpace($repo)) {
          throw "APPVEYOR_REPO_NAME is empty."
      }
      if ([string]::IsNullOrWhiteSpace($tag)) {
          throw "APPVEYOR_REPO_TAG_NAME is empty."
      }
      $apiBase = "https://api.github.com"
      $headers = @{
          Authorization = "Bearer $env:GITHUB_TOKEN"
          Accept = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
          "User-Agent" = "AureTTY-AppVeyor"
      }

      function Get-OrCreateRelease {
          param(
              [Parameter(Mandatory = $true)]
              [string]$Repo,
              [Parameter(Mandatory = $true)]
              [string]$Tag,
              [Parameter(Mandatory = $true)]
              [hashtable]$Headers,
              [Parameter(Mandatory = $true)]
              [string]$ApiBase
          )

          try {
              return Invoke-RestMethod -Method Get -Uri "$ApiBase/repos/$Repo/releases/tags/$Tag" -Headers $Headers
          }
          catch {
              $statusCode = $_.Exception.Response.StatusCode.value__
              if ($statusCode -ne 404) {
                  throw
              }
          }

          $payload = @{
              tag_name = $Tag
              name = $Tag
              draft = $false
              prerelease = $false
              generate_release_notes = $true
          } | ConvertTo-Json

          return Invoke-RestMethod -Method Post -Uri "$ApiBase/repos/$Repo/releases" -Headers $Headers -ContentType "application/json" -Body $payload
      }

      $release = Get-OrCreateRelease -Repo $repo -Tag $tag -Headers $headers -ApiBase $apiBase
      if (-not $release.id) {
          throw "GitHub release id is missing in API response."
      }
      $uploadUrl = "https://uploads.github.com/repos/$repo/releases/$($release.id)/assets"
      Write-Host "Release upload context: Repo='$repo' Tag='$tag' ReleaseId='$($release.id)'."
      Write-Host "Upload base URL: $uploadUrl"
      $assetPattern = '^AureTTY-.*-(win-x64|linux-x64|win-x64-aot|linux-x64-aot|openwrt-x86_64|openwrt-aarch64|openwrt-armv7)\.(zip|sha256)$'
      $assets = Get-ChildItem -Path artifacts -File | Where-Object { $_.Name -match $assetPattern } | Sort-Object Name

      if (-not $assets) {
          throw "No release assets found in artifacts directory."
      }

      foreach ($asset in $assets) {
          $existing = @($release.assets | Where-Object { $_.name -eq $asset.Name })
          foreach ($existingAsset in $existing) {
              if (-not $existingAsset.id) {
                  continue
              }

              $deleteUri = "$apiBase/repos/$repo/releases/assets/$($existingAsset.id)"
              if (-not [Uri]::IsWellFormedUriString($deleteUri, [UriKind]::Absolute)) {
                  throw "Delete URI is invalid: '$deleteUri'"
              }

              Invoke-RestMethod -Method Delete -Uri $deleteUri -Headers $headers
          }

          $uploadUri = "$($uploadUrl)?name=$([Uri]::EscapeDataString($asset.Name))"
          if (-not [Uri]::IsWellFormedUriString($uploadUri, [UriKind]::Absolute)) {
              throw "Upload URI is invalid: '$uploadUri'"
          }

          Invoke-RestMethod -Method Post -Uri $uploadUri -Headers $headers -InFile $asset.FullName -ContentType "application/octet-stream"
          Write-Host "Uploaded release asset $($asset.Name)"
      }
