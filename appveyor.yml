version: "{build}"
image:
  - Visual Studio 2022
  - Ubuntu2204
clone_depth: 1

skip_non_tags: true
skip_branch_with_pr: true

environment:
  DOTNET_INSTALL_VERSION: 10.0.103
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  NUGET_XMLDOC_MODE: skip

build_script:
  - ps: |
      $ErrorActionPreference = if ($IsWindows) { "Continue" } else { "Stop" }
      $dotnet = "dotnet"

      if ($IsWindows) {
          $dotnetInstallDir = "C:\dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1 -UseBasicParsing
          .\dotnet-install.ps1 -Version $env:DOTNET_INSTALL_VERSION -InstallDir $dotnetInstallDir -NoPath
          $dotnet = "$dotnetInstallDir\dotnet.exe"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "$dotnetInstallDir;$env:PATH"
      }
      else {
          $dotnetInstallDir = Join-Path $HOME ".dotnet"
          if (-not (Test-Path $dotnetInstallDir)) {
              New-Item -ItemType Directory -Path $dotnetInstallDir | Out-Null
          }

          Invoke-WebRequest https://dot.net/v1/dotnet-install.sh -OutFile dotnet-install.sh -UseBasicParsing
          bash ./dotnet-install.sh --version $env:DOTNET_INSTALL_VERSION --install-dir $dotnetInstallDir --no-path
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet-install.sh failed with exit code $LASTEXITCODE."
          }

          $dotnet = "$dotnetInstallDir/dotnet"
          $env:DOTNET_ROOT = $dotnetInstallDir
          $env:PATH = "${dotnetInstallDir}:$env:PATH"
      }

      & $dotnet --version 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet --version failed with exit code $LASTEXITCODE."
      }

      & $dotnet restore AureTTY.slnx 2>&1
      if ($LASTEXITCODE -ne 0) {
          throw "dotnet restore AureTTY.slnx failed with exit code $LASTEXITCODE."
      }

      if ($IsWindows) {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }
      else {
          & $dotnet build AureTTY.slnx -c Release --no-restore -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet build AureTTY.slnx failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Tests/AureTTY.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Tests failed with exit code $LASTEXITCODE."
          }

          & $dotnet test tests/AureTTY.Core.Tests/AureTTY.Core.Tests.csproj -c Release --no-build 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet test AureTTY.Core.Tests failed with exit code $LASTEXITCODE."
          }
      }

      if (Test-Path "artifacts/publish") {
          Remove-Item -Recurse -Force "artifacts/publish"
      }

      New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null

      $tag = if ($env:APPVEYOR_REPO_TAG_NAME) { $env:APPVEYOR_REPO_TAG_NAME } else { "dev" }
      $winArchive = "artifacts/AureTTY-$tag-win-x64.zip"
      $linuxArchive = "artifacts/AureTTY-$tag-linux-x64.zip"
      $winAotArchive = "artifacts/AureTTY-$tag-win-x64-aot.zip"
      $linuxAotArchive = "artifacts/AureTTY-$tag-linux-x64-aot.zip"
      $linuxArm64AotArchive = "artifacts/AureTTY-$tag-linux-arm64-aot.zip"
      $linuxArmAotArchive = "artifacts/AureTTY-$tag-linux-arm-aot.zip"
      $linuxX64Manifest = "artifacts/AureTTY-$tag-linux-x64-manifest.txt"
      $linuxArmManifest = "artifacts/AureTTY-$tag-linux-arm-manifest.txt"
      $openwrtX64Archive = "artifacts/AureTTY-$tag-openwrt-x86_64.zip"
      $openwrtAarch64Archive = "artifacts/AureTTY-$tag-openwrt-aarch64.zip"
      $openwrtArmv7Archive = "artifacts/AureTTY-$tag-openwrt-armv7.zip"
      $openwrtX64IpkArchive = "artifacts/AureTTY-$tag-openwrt-x86_64-ipk.zip"
      $openwrtAarch64IpkArchive = "artifacts/AureTTY-$tag-openwrt-aarch64-ipk.zip"
      $openwrtArmv7IpkArchive = "artifacts/AureTTY-$tag-openwrt-armv7-ipk.zip"
      $openwrtManifest = "artifacts/AureTTY-$tag-openwrt-manifest.txt"

      if ($IsWindows) {
          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64 failed with exit code $LASTEXITCODE."
          }

          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0 -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/linux-x64 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish linux-x64 failed with exit code $LASTEXITCODE."
          }

          & $dotnet publish src/AureTTY/AureTTY.csproj -f net10.0-windows -c Release -r win-x64 --self-contained true -p:PublishAot=true -p:OpenApiGenerateDocuments=false -p:OpenApiGenerateDocumentsOnBuild=false -o artifacts/publish/win-x64-aot 2>&1
          if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish win-x64-aot failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/publish/win-x64/*" -DestinationPath $winArchive -Force
          Compress-Archive -Path "artifacts/publish/linux-x64/*" -DestinationPath $linuxArchive -Force
          Compress-Archive -Path "artifacts/publish/win-x64-aot/*" -DestinationPath $winAotArchive -Force

          Get-FileHash $winArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $winArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-win-x64.sha256"

          Get-FileHash $linuxArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-x64.sha256"

          Get-FileHash $winAotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $winAotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-win-x64-aot.sha256"
      }
      else {
          bash ./scripts/ci/build-linux-x64-aot.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux x64 AOT build+smoke failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/publish/linux-x64-aot/*" -DestinationPath $linuxAotArchive -Force
          Get-FileHash $linuxAotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxAotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-x64-aot.sha256"

          bash ./scripts/ci/build-linux-arm-emulated.sh
          if ($LASTEXITCODE -ne 0) {
              throw "Linux ARM emulated builds failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/publish/linux-arm64-aot/*" -DestinationPath $linuxArm64AotArchive -Force
          Compress-Archive -Path "artifacts/publish/linux-arm-aot/*" -DestinationPath $linuxArmAotArchive -Force

          Get-FileHash $linuxArm64AotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxArm64AotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-arm64-aot.sha256"

          Get-FileHash $linuxArmAotArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxArmAotArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-arm-aot.sha256"

          $linuxX64ManifestSource = "artifacts/publish/linux-x64-manifest.txt"
          if (-not (Test-Path $linuxX64ManifestSource)) {
              throw "Missing Linux x64 manifest: $linuxX64ManifestSource"
          }
          Copy-Item -Path $linuxX64ManifestSource -Destination $linuxX64Manifest -Force
          Get-FileHash $linuxX64Manifest -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxX64Manifest)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-x64-manifest.sha256"

          bash ./scripts/ci/build-openwrt-artifacts.sh
          if ($LASTEXITCODE -ne 0) {
              throw "OpenWRT builds failed with exit code $LASTEXITCODE."
          }

          Compress-Archive -Path "artifacts/openwrt/x86_64/*" -DestinationPath $openwrtX64Archive -Force
          Compress-Archive -Path "artifacts/openwrt/aarch64/*" -DestinationPath $openwrtAarch64Archive -Force
          Compress-Archive -Path "artifacts/openwrt/armv7/*" -DestinationPath $openwrtArmv7Archive -Force
          Compress-Archive -Path "artifacts/openwrt/ipk/x86_64/*" -DestinationPath $openwrtX64IpkArchive -Force
          Compress-Archive -Path "artifacts/openwrt/ipk/aarch64/*" -DestinationPath $openwrtAarch64IpkArchive -Force
          Compress-Archive -Path "artifacts/openwrt/ipk/armv7/*" -DestinationPath $openwrtArmv7IpkArchive -Force

          Get-FileHash $openwrtX64Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtX64Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-x86_64.sha256"

          Get-FileHash $openwrtAarch64Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtAarch64Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-aarch64.sha256"

          Get-FileHash $openwrtArmv7Archive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtArmv7Archive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-armv7.sha256"

          Get-FileHash $openwrtX64IpkArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtX64IpkArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-x86_64-ipk.sha256"

          Get-FileHash $openwrtAarch64IpkArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtAarch64IpkArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-aarch64-ipk.sha256"

          Get-FileHash $openwrtArmv7IpkArchive -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtArmv7IpkArchive)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-armv7-ipk.sha256"

          $linuxArmManifestSource = "artifacts/publish/linux-arm-manifest.txt"
          if (-not (Test-Path $linuxArmManifestSource)) {
              throw "Missing Linux ARM manifest: $linuxArmManifestSource"
          }
          Copy-Item -Path $linuxArmManifestSource -Destination $linuxArmManifest -Force
          Get-FileHash $linuxArmManifest -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $linuxArmManifest)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-linux-arm-manifest.sha256"

          $openwrtManifestSource = "artifacts/openwrt/manifest.txt"
          if (-not (Test-Path $openwrtManifestSource)) {
              throw "Missing OpenWRT manifest: $openwrtManifestSource"
          }
          Copy-Item -Path $openwrtManifestSource -Destination $openwrtManifest -Force
          Get-FileHash $openwrtManifest -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash)  $(Split-Path -Leaf $openwrtManifest)"
          } | Out-File -Encoding ascii "artifacts/AureTTY-$tag-openwrt-manifest.sha256"

          bash ./scripts/ci/validate-release-archives.sh `
            "$linuxAotArchive" `
            "$linuxArm64AotArchive" `
            "$linuxArmAotArchive" `
            "$openwrtX64Archive" `
            "$openwrtAarch64Archive" `
            "$openwrtArmv7Archive" `
            "$openwrtX64IpkArchive" `
            "$openwrtAarch64IpkArchive" `
            "$openwrtArmv7IpkArchive"
          if ($LASTEXITCODE -ne 0) {
              throw "Release archive validation failed with exit code $LASTEXITCODE."
          }
      }

artifacts:
  - path: artifacts/AureTTY-*-win-x64.zip
    name: auretty-win-x64
  - path: artifacts/AureTTY-*-linux-x64.zip
    name: auretty-linux-x64
  - path: artifacts/AureTTY-*-win-x64-aot.zip
